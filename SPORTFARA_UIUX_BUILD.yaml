# ============================================================
# PHASE 3 — COMPONENT BUILD SPECS (MVP ONLY)
# ============================================================

phase_3_component_specs:
  instruction: >
    Build every MVP component to this exact spec.
    Apply the ui-ux-pro-max skill for all visual decisions.
    Use the SPORTFARA design tokens from CLAUDE.md.
    Every component: TypeScript, fully typed props,
    Tailwind only (no inline style except where unavoidable),
    accessible (ARIA labels, keyboard nav, focus rings),
    responsive (375px → 1280px), Framer Motion where specified.

  MatchBriefCard:
    props: "{ match: MatchType, index: number, userTier: 'free' | 'premium' | 'pro' }"
    layout: >
      Glass card, premium-orange left border (border-l-4).
      Row 1: League badge (left) + match date/time (right, text-secondary).
      Row 2: Home team vs Away team — font-bold text-xl, team flags if available.
      Row 3: ProbabilityDisplay component (3 animated bars).
      Row 4: Explainability — "Why: [reason]" — text-sm text-secondary italic.
      Row 5: OddsTable (3 bookmakers, best line in trust-green).
      Row 6: SourceBadge (bottom right).
      Free tier gate: cards index 2+ get PaywallGate overlay (blur + CTA).
    animation: "fade-in, staggered by index * 0.1s delay"

  GlassNav:
    layout: >
      fixed top-0 z-50, full width.
      bg-primary-dark/80 backdrop-blur-xl border-b border-white/10.
      Left: Logo SVG + "SPORTFARA" wordmark (font-bold text-xl white).
      Centre (hidden below md): NavLinks array mapped from routes.ts.
        Active link: text-premium-orange, bottom border premium-orange.
        Locked link: opacity-40, cursor-not-allowed, lock icon (14px) inline.
      Right: LanguageToggle + Search icon button + Bell icon button + Avatar.
        Unauthenticated: "Sign in" ghost button + "Get Premium" orange button.
    animation: "slideDown on mount, 0.3s ease-out"

  BottomNav:
    layout: >
      fixed bottom-0, md:hidden, full width.
      bg-surface-dark/90 backdrop-blur-xl border-t border-white/10.
      Safe area padding: padding-bottom env(safe-area-inset-bottom).
      5 items: Home / Matches / Betting / Profile / Creator.
      Active: icon + label in premium-orange.
      Locked (Matches, Betting): opacity-40, no click handler, small lock overlay.
      Creator tab: only renders if user.role === 'creator'.

  PaywallGate:
    layout: >
      Full-width card. No blur. Hard replacement — card content hidden, gate shown.
      Glass card with glow-orange shadow.
      Lock icon (32px, premium-orange) centred top.
      H2: "You've read your 3 free briefings this week."
      P: "Upgrade to Premium for unlimited daily intelligence — EN + FR."
      Button primary: "Upgrade — $10/month" → /subscribe.
      Button ghost: "See all plans" → /subscribe.
      Small text: "Cancel anytime. No commitment." text-tertiary text-xs.
    animation: "scale-up on mount"

  ContentPublisher:
    layout: >
      Full-width form. No card wrapper — flows in page.
      Title: large input, font-bold text-2xl, placeholder "Article title...".
      Language toggle: EN | FR | Both — determines which body fields show.
      Body EN: textarea, min-height 300px, markdown-aware (monospace).
      Body FR: same, only visible if FR or Both selected.
      Paywall selector: 3 pill buttons — Free / Premium / Pro.
        Selected: premium-orange bg. Unselected: ghost border.
      Schedule row: "Publish now" toggle (default on) vs datetime picker.
      Footer bar: word count + read time (live) left. "Save draft" ghost + "Publish" orange right.

  TrackRecordWidget:
    layout: >
      trust-green border-l-4 card.
      Header: Avatar (40px) + Creator name (font-bold) + "Verified Analyst" green badge.
      Stats row (3 cols): Lifetime Win % | Last 30d ROI | Total Picks.
        Numbers: font-extrabold text-2xl premium-orange.
        Labels: text-xs text-secondary uppercase.
      Recharts LineChart: unit P&L last 90 days.
        Line: premium-orange. Area fill: orange/10. Grid: border-subtle.
        X axis: date labels. Y axis: +/- units.
      Footer: "Track record is immutable and publicly verifiable." — text-xs text-tertiary italic.

  PricingTable:
    layout: >
      3-column grid (stacks to 1 col on mobile).
      Free card: standard glass card.
      Premium card: featured, 2px border-premium-orange, "Most popular" badge top.
      Pro card: standard glass card.
      Each card: tier name (text-xl bold) + price (text-4xl extrabold premium-orange) + period (/month text-secondary).
      Feature list: CheckIcon (trust-green) for included, dash (text-tertiary) for excluded.
      CTA button per card.
      Annual toggle above table: "Monthly / Annual (save 33%)" — switches all prices.
      Footer: "Local currency available at checkout. Cancel anytime."

