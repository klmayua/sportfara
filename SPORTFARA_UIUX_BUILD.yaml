# ============================================================
# SPORTFARA™ — UI/UX SCAFFOLD BUILD SPEC
# Claude Code reads CLAUDE.md first (skill + context loaded there)
# This file contains the pure build instructions only.
# Version: 2.0 | June 2026
# ============================================================

# ============================================================
# PHASE 1 — PROJECT INITIALISATION
# ============================================================

phase_1_init:

  - step: create_nextjs_project
    command: >
      npx create-next-app@latest sportfara-ui
      --typescript --tailwind --eslint --app
      --src-dir --import-alias "@/*"

  - step: install_dependencies
    production:
      - framer-motion
      - lucide-react
      - next-pwa
      - next-intl
      - clsx
      - tailwind-merge
      - "@radix-ui/react-dialog"
      - "@radix-ui/react-tabs"
      - "@radix-ui/react-dropdown-menu"
      - "@radix-ui/react-switch"
      - "@radix-ui/react-avatar"
      - recharts
      - react-hook-form
      - zod
      - "@tanstack/react-query"
    development:
      - prettier
      - "@typescript-eslint/eslint-plugin"
      - autoprefixer

  - step: configure_tailwind
    file: sportfara-ui/tailwind.config.ts
    instruction: >
      Generate the complete tailwind.config.ts using every design
      token defined in CLAUDE.md. Include all custom colours,
      glassmorphism utilities, animation keyframes, shadow tokens,
      font families, and Tailwind plugins
      (@tailwindcss/forms, @tailwindcss/typography, @tailwindcss/aspect-ratio).
      This file is the single source of truth for all visual decisions.

  - step: configure_globals_css
    file: sportfara-ui/src/styles/globals.css
    instruction: >
      Write global CSS including: shimmer keyframe animation,
      glass effect utility classes, custom scrollbar styling
      (dark themed), font-face declarations for Inter and
      JetBrains Mono, base resets, and safe-area padding
      utilities for iOS PWA.

  - step: configure_pwa
    file: sportfara-ui/next.config.ts
    pwa_manifest:
      name: SPORTFARA
      short_name: SPORTFARA
      description: "Where Sports Begin — African Sports Intelligence"
      theme_color: "#262938"
      background_color: "#262938"
      display: standalone
      start_url: "/"
      icons:
        - src: "/icons/icon-192.png"
          sizes: "192x192"
          type: "image/png"
        - src: "/icons/icon-512.png"
          sizes: "512x512"
          type: "image/png"

  - step: configure_i18n
    files:
      - sportfara-ui/src/messages/en.json
      - sportfara-ui/src/messages/fr.json
    instruction: >
      Populate both locale files with all user-facing strings
      for these namespaces: nav, feed, match, betting, creator,
      dashboard, auth, paywall, common, errors, comingSoon.
      EN and FR are equals. Every key present in en.json
      must exist in fr.json. No missing translations.
      Use real SPORTFARA copy — not placeholder text.

