# ============================================================
# PHASE 5 — STUB ALL DORMANT ROUTES
# ============================================================

phase_5_stubs:
  instruction: >
    For every STUB file in Phase 2, write this exact pattern:
    Import ComingSoon from @/components/layout/ComingSoon.
    Export a default function that returns <ComingSoon feature="[Feature Name]" />.
    The ComingSoon component accepts a feature prop and says
    "[Feature Name] is coming soon." with a waitlist email capture.
    No 404s. No broken routes. Everything is reachable.

# ============================================================
# PHASE 6 — FEATURE FLAGS
# ============================================================

phase_6_feature_flags:
  file: sportfara-ui/src/lib/constants/featureFlags.ts
  instruction: >
    Write a typed const object FLAGS with boolean values.
    Export a helper: isEnabled(flag: keyof typeof FLAGS): boolean.
    Every locked nav item, route guard, and feature entry point
    calls isEnabled() before rendering. Flipping a flag to true
    is the only code change needed to activate any feature.
  flags:
    INTELLIGENCE_FEED: true
    BETTOR_DASHBOARD: true
    CREATOR_DASHBOARD: true
    AUTH: true
    SUBSCRIPTIONS: true
    MATCH_CENTER: false
    BETTING_MODELS: false
    COMMUNITY_FORUMS: false
    LIVE_ROOMS: false
    SCOUTING_DATABASE: false
    SCOUTING_MARKETPLACE: false
    ENTERPRISE_API: false
    AI_COPILOT: false

# ============================================================
# PHASE 7 — QUALITY AUDIT
# ============================================================

phase_7_audit:
  run_after: all phases complete
  checks:
    - "npm run build completes with zero TypeScript errors"
    - "npm run lint passes with zero errors"
    - "Every component renders at 375px without horizontal scroll"
    - "Every component renders at 1280px without layout breaks"
    - "All focus states visible (focus:ring-2 focus:ring-premium-orange)"
    - "No hardcoded colours outside tailwind.config.ts"
    - "No lorem ipsum anywhere — all copy is real SPORTFARA content"
    - "EN and FR locale files have identical key sets"
    - "PWA manifest valid — run: npx pwa-asset-generator check"
    - "All STUB files return ComingSoon, not null or undefined"
    - "Feature flags file exports isEnabled() helper correctly"

# ============================================================
# PHASE 8 — COMPLETION REPORT
# ============================================================

phase_8_output:
  instruction: >
    When all phases pass, output a completion report with:

    1. File manifest table: filename | type | status | notes
    2. Design decisions log: any ambiguity encountered and how resolved
    3. Dev server command: cd sportfara-ui && npm run dev
    4. First three things to do next:
       a. Replace mocked data with real Supabase calls (M1 build phase)
       b. Add Google OAuth credentials to .env.local
       c. Add Stripe + Paystack keys to .env.local
    5. Confirmation that ui-ux-pro-max skill was applied throughout

